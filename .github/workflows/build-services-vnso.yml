name: Build Services VNSO

on:
  push:
    branches:
      - vnso
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Release Docker images (vnso)
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      id-token: write
      issues: write
    steps:
      - name: Check Disk Space
        run: |
          df -h
          docker system df

      - name: Clean up Docker resources
        run: |
          docker system prune -af
          docker builder prune -af

      - name: Stabilize git transport
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000

      - name: Checkout code (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout code (retry)
        if: steps.checkout1.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Decide vnso tags
        run: |
          IMAGE_REPO="ghcr.io/${{ github.repository }}"
          echo "SERVER_TAGS=${IMAGE_REPO}:server_vnso_latest" >> $GITHUB_ENV
          echo "WEB_TAGS=${IMAGE_REPO}:web_vnso_latest" >> $GITHUB_ENV

      - name: Build and push xiaozhi-server (vnso)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-server
          push: true
          tags: ${{ env.SERVER_TAGS }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=server-vnso
          cache-to: type=gha,mode=max,scope=server-vnso
          build-args: |
            BUILDKIT_PROGRESS=plain

      - name: Build and push manager-web (vnso)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-web
          push: true
          tags: ${{ env.WEB_TAGS }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=web-vnso
          cache-to: type=gha,mode=max,scope=web-vnso
          build-args: |
            BUILDKIT_PROGRESS=plain
