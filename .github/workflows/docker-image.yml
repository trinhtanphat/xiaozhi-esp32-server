name: Docker Image CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'  # 只在以 v 开头的标签推送时触发，例如 v1.0.0
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Base Image"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Release Docker images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      id-token: write
      issues: write
    steps:
      - name: Check Disk Space
        run: |
          df -h
          docker system df

      - name: Clean up Docker resources
        run: |
          docker system prune -af
          docker builder prune -af

      - name: Stabilize git transport
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000

      - name: Checkout code (attempt 1)
        id: checkout1
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout code (retry)
        if: steps.checkout1.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract version from tag
        id: get_version
        run: |
          IMAGE_REPO="ghcr.io/${{ github.repository }}"
          if [[ "$GITHUB_REF" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "VERSION=${BASH_REMATCH[1]}" >> $GITHUB_ENV
            echo "IS_VERSION=true" >> $GITHUB_ENV
            echo "SERVER_TAGS=${IMAGE_REPO}:server_${BASH_REMATCH[1]},${IMAGE_REPO}:server_latest" >> $GITHUB_ENV
            echo "WEB_TAGS=${IMAGE_REPO}:web_${BASH_REMATCH[1]},${IMAGE_REPO}:web_latest" >> $GITHUB_ENV
          else
            echo "VERSION=latest" >> $GITHUB_ENV
            echo "IS_VERSION=false" >> $GITHUB_ENV
            BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
            if [[ "$BRANCH_NAME" == "main" ]]; then
              SERVER_SUFFIX="latest"
              WEB_SUFFIX="latest"
            else
              SERVER_SUFFIX="${BRANCH_NAME}_latest"
              WEB_SUFFIX="${BRANCH_NAME}_latest"
            fi
            echo "SERVER_TAGS=${IMAGE_REPO}:server_${SERVER_SUFFIX}" >> $GITHUB_ENV
            echo "WEB_TAGS=${IMAGE_REPO}:web_${WEB_SUFFIX}" >> $GITHUB_ENV
          fi

      # 构建 xiaozhi-server 镜像
      - name: Build and push xiaozhi-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-server
          push: true
          tags: ${{ env.SERVER_TAGS }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_PROGRESS=plain

      # 构建 manager-api 镜像
      - name: Build and push manager-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-web
          push: true
          tags: ${{ env.WEB_TAGS }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_PROGRESS=plain
